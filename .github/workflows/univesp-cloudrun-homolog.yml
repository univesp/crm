name: Univesp Cloud Run Homolog

on:
  workflow_dispatch:
    inputs:
      provision_infra:
        description: "Provisionar Artifact Registry, bucket, service account e VPC connector antes do deploy"
        required: false
        default: "false"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/univesp-cloudrun-homolog.yml"
      - "ops/cloudrun/**"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      FRAPPE_SITE_NAME: ${{ vars.FRAPPE_SITE_NAME }}
      PUBLIC_DOMAIN: ${{ vars.PUBLIC_DOMAIN }}
      DB_TYPE: ${{ vars.DB_TYPE }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_ROOT_USERNAME: ${{ vars.DB_ROOT_USERNAME }}
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE }}
      SITES_BUCKET: ${{ vars.SITES_BUCKET }}
      VPC_NETWORK: ${{ vars.VPC_NETWORK }}
      VPC_CONNECTOR: ${{ vars.VPC_CONNECTOR }}
      VPC_CONNECTOR_RANGE: ${{ vars.VPC_CONNECTOR_RANGE }}
      CLOUDRUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUDRUN_RUNTIME_SERVICE_ACCOUNT }}
      REDIS_CACHE_SECRET_NAME: ${{ vars.REDIS_CACHE_SECRET_NAME }}
      REDIS_QUEUE_SECRET_NAME: ${{ vars.REDIS_QUEUE_SECRET_NAME }}
      REDIS_SOCKETIO_SECRET_NAME: ${{ vars.REDIS_SOCKETIO_SECRET_NAME }}
      DB_ROOT_PASSWORD_SECRET_NAME: ${{ vars.DB_ROOT_PASSWORD_SECRET_NAME }}
      DB_PASSWORD_SECRET_NAME: ${{ vars.DB_PASSWORD_SECRET_NAME }}
      ADMIN_PASSWORD_SECRET_NAME: ${{ vars.ADMIN_PASSWORD_SECRET_NAME }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Optionally provision base infrastructure
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.provision_infra == 'true' }}
        run: ./ops/cloudrun/provision.sh

      - name: Sync DB root password to Secret Manager
        env:
          SECRET_NAME: ${{ vars.DB_ROOT_PASSWORD_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.DB_ROOT_PASSWORD }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Sync DB password to Secret Manager
        env:
          SECRET_NAME: ${{ vars.DB_PASSWORD_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.DB_PASSWORD }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Sync administrator password to Secret Manager
        env:
          SECRET_NAME: ${{ vars.ADMIN_PASSWORD_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.ADMIN_PASSWORD }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Sync Redis cache URL to Secret Manager
        env:
          SECRET_NAME: ${{ vars.REDIS_CACHE_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.REDIS_CACHE_URL }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Sync Redis queue URL to Secret Manager
        env:
          SECRET_NAME: ${{ vars.REDIS_QUEUE_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.REDIS_QUEUE_URL }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Sync Redis socket.io URL to Secret Manager
        env:
          SECRET_NAME: ${{ vars.REDIS_SOCKETIO_SECRET_NAME }}
          SECRET_VALUE: ${{ secrets.REDIS_SOCKETIO_URL }}
        run: ./ops/cloudrun/sync_secret.sh

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"
          APPS_JSON=$(jq -cn --arg url "https://github.com/${GITHUB_REPOSITORY}" --arg branch "${GITHUB_REF_NAME}" '[{url: $url, branch: $branch}]')
          echo "apps_json_base64=$(printf '%s' "${APPS_JSON}" | base64 -w 0)" >> "${GITHUB_OUTPUT}"

      - name: Build and push Cloud Run image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/cloudrun/Containerfile
          push: true
          tags: ${{ steps.meta.outputs.image_uri }}
          build-args: |
            FRAPPE_BRANCH=version-16
            APPS_JSON_BASE64=${{ steps.meta.outputs.apps_json_base64 }}

      - name: Deploy Cloud Run services and job
        env:
          IMAGE_URI: ${{ steps.meta.outputs.image_uri }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ./ops/cloudrun/deploy.sh
